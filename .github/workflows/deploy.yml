name: Deploy to Production (FTP)

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests (Vitest)
        run: npm run test

      - name: 🔍 Verificar secrets disponibles (diagnóstico)
        run: |
          echo "FTP_SERVER definido: ${{ secrets.FTP_SERVER != '' }}"
          echo "VITE_FIREBASE_API_KEY definido: ${{ secrets.VITE_FIREBASE_API_KEY != '' }}"
          echo "ENV_FILE definido: ${{ secrets.ENV_FILE != '' }}"

      - name: 📝 Crear archivo .env desde secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 🛠️ Build project (Vite)
        run: npm run build

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          # Exclusions to prevent unnecessary uploads
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
